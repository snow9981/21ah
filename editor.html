<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>스물하나 동물병원 문구/스타일 편집기</title>
    <style>
      :root {
        --green: #203b33;
        --gold: #b88a55;
        --cream: #fffdf8;
        --ivory: #fbf7ef;
        --line: rgba(32, 59, 51, 0.16);
        --muted: #66706a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--ivory);
        color: #202724;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
        line-height: 1.6;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 5;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.94);
        backdrop-filter: blur(16px);
      }

      .header-inner,
      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }

      .header-inner {
        min-height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        color: var(--green);
        font-size: clamp(1.35rem, 4vw, 2rem);
      }

      .header-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button,
      a.button {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        padding: 10px 14px;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary,
      a.button.secondary {
        border-color: var(--line);
        background: var(--cream);
        color: var(--green);
      }

      main {
        padding: 34px 0 80px;
      }

      .notice {
        display: grid;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--cream);
        padding: 18px;
        color: var(--muted);
      }

      .notice strong {
        color: var(--green);
      }

      #editor {
        display: grid;
        gap: 18px;
        margin-top: 24px;
      }

      fieldset {
        display: grid;
        gap: 16px;
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.92);
        padding: 20px;
      }

      legend {
        color: var(--gold);
        font-weight: 900;
        padding: 0 8px;
      }

      label {
        display: grid;
        gap: 6px;
      }

      label span {
        color: var(--green);
        font-size: 0.92rem;
        font-weight: 850;
      }

      textarea {
        width: 100%;
        min-height: 86px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #202724;
        padding: 12px;
        font: inherit;
        line-height: 1.55;
      }

      textarea:focus {
        outline: 3px solid rgba(184, 138, 85, 0.3);
        border-color: var(--gold);
      }

      select,
      input {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #202724;
        padding: 9px 10px;
        font: inherit;
      }

      select:focus,
      input:focus {
        outline: 3px solid rgba(184, 138, 85, 0.3);
        border-color: var(--gold);
      }

      .style-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .style-help {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .font-preview {
        display: grid;
        gap: 14px;
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.94);
        padding: 20px;
      }

      .font-preview-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: end;
      }

      .font-preview-output {
        min-height: 92px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(32, 59, 51, 0.12);
        border-radius: 8px;
        background: #fff;
        color: var(--green);
        padding: 22px;
        font-size: clamp(2rem, 7vw, 4.2rem);
        font-weight: 800;
        line-height: 1.15;
        text-align: center;
        word-break: keep-all;
      }

      .status {
        margin-top: 16px;
        color: var(--green);
        font-weight: 800;
      }

      .path {
        color: var(--muted);
        font-size: 0.78rem;
        font-family: Consolas, monospace;
      }

      .style-grid .path {
        font-family: inherit;
      }

      @media (max-width: 720px) {
        .header-inner {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px 0;
        }

        .header-actions,
        button,
        a.button {
          width: 100%;
        }

        .style-grid {
          grid-template-columns: 1fr;
        }

        .font-preview-controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

        </div>
        <div class="header-actions">
          <a class="button secondary" href="index.html" target="_blank" rel="noreferrer">홈페이지 보기</a>
          <button class="secondary" type="button" id="resetButton">처음 값으로 되돌리기</button>
          <button class="secondary" type="button" id="exportButton">content.js 내려받기</button>
          <button type="button" id="saveButton">홈페이지에 적용</button>
        </div>
      </div>
    </header>

    <main>
      <section class="notice">
        <strong>사용 방법</strong>
        <p>아래 문구와 스타일을 수정한 뒤 <b>홈페이지에 적용</b>을 누르세요. 같은 브라우저에서 홈페이지를 새로고침하면 바로 반영됩니다.</p>
        <p>배포용 파일이 필요하면 <b>content.js 내려받기</b>를 누른 뒤 이 폴더의 기존 파일과 교체하세요.</p>
      </section>

      <section class="font-preview" aria-labelledby="font-preview-title">
        <div>
          <h2 id="font-preview-title">글꼴 미리보기</h2>
          <p class="style-help">글꼴을 선택한 뒤 미리보기 버튼을 누르면 아래 예시 문구에 적용됩니다.</p>
        </div>
        <div class="font-preview-controls">

            <span>미리볼 글꼴</span>
            <select id="fontPreviewSelect"></select>
          </label>
          <button class="secondary" type="button" id="fontPreviewButton">미리보기</button>
        </div>
        <div class="font-preview-output" id="fontPreviewOutput">스물하나동물병원</div>
      </section>

      <form id="editor" aria-label="홈페이지 문구 편집 양식"></form>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>

      document.write('<script src="content.js?v=' + Date.now() + '"><\/script>');

      function loadSavedContent() {
        try {
          const savedContent = window.localStorage.getItem("SITE_CONTENT_DRAFT");
          if (!savedContent) return null;
          return JSON.parse(savedContent);
        } catch (error) {
          console.warn("Saved SITE_CONTENT loading failed", error);
          return null;
        }
      }

      function saveBrowserContent(content) {
        window.localStorage.setItem("SITE_CONTENT_DRAFT", JSON.stringify(content));
      }

      function clearBrowserContent() {
        window.localStorage.removeItem("SITE_CONTENT_DRAFT");
      }

      const savedContent = loadSavedContent();
      if (savedContent) {
        window.SITE_CONTENT = savedContent;
      }

      function ensureStyleSettings() {
        if (!window.SITE_CONTENT.styles) window.SITE_CONTENT.styles = {};

        Object.keys(styleSectionNames).forEach((section) => {
          if (!window.SITE_CONTENT.styles[section]) window.SITE_CONTENT.styles[section] = {};
          styleFields.forEach((field) => {
            if (window.SITE_CONTENT.styles[section][field.key] === undefined) {
              window.SITE_CONTENT.styles[section][field.key] = "";
            }
          });
        });
      }

      function renderFontPreviewSelect() {
        fontOptions.forEach(([value, text]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = text;
          fontPreviewSelect.appendChild(option);
        });

        const firstRealFont = fontOptions.find(([value]) => value);
        if (firstRealFont) {
          fontPreviewSelect.value = firstRealFont[0];
        }
      }

      function updateFontPreview() {
        const fontFamily = fontPreviewSelect.value;
        fontPreviewOutput.style.fontFamily = fontFamily || "";
      }

      function flatten(value, prefix = []) {
        if (typeof value === "string") {
          return [{ path: prefix.join("."), value }];
        }

        if (Array.isArray(value)) {
          return value.flatMap((item, index) => flatten(item, prefix.concat(index)));
        }

        if (value && typeof value === "object") {
          return Object.keys(value).flatMap((key) => flatten(value[key], prefix.concat(key)));
        }

        return [];
      }

      function setByPath(target, path, value) {
        const parts = path.split(".");
        let current = target;

        parts.forEach((part, index) => {
          const isLast = index === parts.length - 1;
          const nextPart = parts[index + 1];
          const key = Number.isInteger(Number(part)) ? Number(part) : part;

          if (isLast) {
            current[key] = value;
            return;
          }

          if (current[key] === undefined) {
            current[key] = Number.isInteger(Number(nextPart)) ? [] : {};
          }

          current = current[key];
        });
      }

      function labelFor(path) {
        const parts = path.split(".");
        const last = parts[parts.length - 1];
        const labels = {
          title: "제목",
          text: "설명",
          description: "설명",
          subtitle: "보조 문구",
          kicker: "섹션 라벨",

          label: "작은 라벨",
          role: "역할/진료 분야",
          careers: "경력/약력"
        };

        if (parts.includes("careers")) {
          return "경력/약력 " + (Number(parts[parts.length - 1]) + 1);
        }

        return labels[last] || path;
      }

      function createStyleControl(section, field) {
        const label = document.createElement("label");
        const labelText = document.createElement("span");
        const pathText = document.createElement("small");
        const currentValue = window.SITE_CONTENT.styles?.[section]?.[field.key] || "";
        const currentOption = currentValue ? field.options?.find(([value]) => value === currentValue) : null;
        const currentLabel = currentOption ? currentOption[1] : currentValue;
        const defaultValue = defaultStyleValues[section]?.[field.key] || "기존 디자인";
        const displayValue = currentLabel || defaultValue;
        let control;

        labelText.textContent = field.label + " (현재 설정값: " + displayValue + ")";
        pathText.className = "path";
        pathText.textContent = "목록에서 선택하면 됩니다. 어려운 단위나 코드를 직접 쓰지 않아도 됩니다.";

        if (field.type === "select") {
          control = document.createElement("select");
          if (currentValue && !field.options.some(([value]) => value === currentValue)) {
            const option = document.createElement("option");
            option.value = currentValue;
            option.textContent = "현재 직접 설정값: " + currentValue;
            control.appendChild(option);
          }
          field.options.forEach(([value, text]) => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = text;
            control.appendChild(option);
          });
        } else {
          control = document.createElement("input");
          control.type = "text";
          control.placeholder = currentValue ? field.placeholder || "" : defaultValue;
        }

        control.name = "styles." + section + "." + field.key;
        control.value = currentValue;
        label.append(labelText, pathText, control);
        return label;
      }

      function renderStyleEditor() {
        ensureStyleSettings();

        Object.keys(styleSectionNames).forEach((section) => {
          const fieldset = document.createElement("fieldset");
          const legend = document.createElement("legend");
          const help = document.createElement("p");
          const grid = document.createElement("div");

          legend.textContent = styleSectionNames[section];
          help.className = "style-help";
          help.textContent = "원하는 항목을 목록에서 선택하세요. 기존 디자인 유지를 선택하면 원래 홈페이지 설정을 그대로 씁니다.";
          grid.className = "style-grid";

          styleFields.forEach((field) => {
            grid.appendChild(createStyleControl(section, field));
          });

          fieldset.append(legend, help, grid);
          editor.appendChild(fieldset);
        });
      }

      function renderEditor() {
        editor.innerHTML = "";
        const contentForText = structuredClone(window.SITE_CONTENT || {});
        delete contentForText.styles;
        renderStyleEditor();

        const items = flatten(contentForText);
        const groups = new Map();

        items.forEach((item) => {
          const section = item.path.split(".")[0];
          if (!groups.has(section)) groups.set(section, []);
          groups.get(section).push(item);
        });

        groups.forEach((groupItems, section) => {
          const fieldset = document.createElement("fieldset");
          const legend = document.createElement("legend");
          legend.textContent = sectionNames[section] || section;
          fieldset.appendChild(legend);

          groupItems.forEach((item) => {
            const label = document.createElement("label");
            const labelText = document.createElement("span");
            const pathText = document.createElement("small");
            const textarea = document.createElement("textarea");

            labelText.textContent = labelFor(item.path);
            pathText.className = "path";
            pathText.textContent = item.path;
            textarea.name = item.path;
            textarea.value = item.value;
            textarea.rows = item.value.length > 90 || item.value.includes("\n") ? 4 : 2;

            label.append(labelText, pathText, textarea);
            fieldset.appendChild(label);
          });

          editor.appendChild(fieldset);
        });
      }

      function collectContent() {
        const nextContent = {};
        editor.querySelectorAll("textarea").forEach((textarea) => {
          setByPath(nextContent, textarea.name, textarea.value);
        });
        editor.querySelectorAll("select, input").forEach((control) => {
          if (!control.name) return;
          setByPath(nextContent, control.name, control.value);
        });
        nextContent.contentVersion = new Date().toLocaleString("ko-KR");
        return nextContent;
      }

      function buildContentFile(content) {
        const json = JSON.stringify(content, null, 2);
        return (
          "window.SITE_CONTENT = " + json + ";\n" +
          "document.documentElement.dataset.siteContent = JSON.stringify(window.SITE_CONTENT);\n" +
          "document.documentElement.dataset.contentLoaded = \"true\";\n"
        );
      }

      async function saveContent() {
        const nextContent = collectContent();

        saveBrowserContent(nextContent);
        window.SITE_CONTENT = structuredClone(nextContent);
        status.textContent = "홈페이지에 적용했습니다. 열려 있는 홈페이지 탭을 새로고침하면 반영됩니다.";
      }

      async function exportContentFile() {
        const fileText = buildContentFile(collectContent());

        if ("showSaveFilePicker" in window) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: "content.js",
              types: [
                {
                  description: "JavaScript file",
                  accept: { "text/javascript": [".js"] }
                }
              ]
            });
            const writable = await handle.createWritable();
            await writable.write(fileText);
            await writable.close();
            status.textContent = "content.js 파일을 저장했습니다.";
            return;
          } catch (error) {
            if (error.name === "AbortError") return;
          }
        }

        const blob = new Blob([fileText], { type: "text/javascript;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "content.js";
        link.click();
        URL.revokeObjectURL(url);
        status.textContent = "content.js를 다운로드했습니다.";
      }

      document.querySelector("#saveButton").addEventListener("click", saveContent);
      document.querySelector("#exportButton").addEventListener("click", exportContentFile);
      document.querySelector("#resetButton").addEventListener("click", () => {
        clearBrowserContent();
        window.SITE_CONTENT = structuredClone(originalContent);
        renderEditor();
        status.textContent = "브라우저에 저장된 편집값을 지우고 content.js 기준으로 되돌렸습니다.";
      });

      fontPreviewButton.addEventListener("click", updateFontPreview);
      renderFontPreviewSelect();
      updateFontPreview();
      renderEditor();
    </script>
  </body>
</html>
